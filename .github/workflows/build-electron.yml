name: Build Electron

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run gate tests
        run: npm test

      - name: Run evals
        run: npm run eval

      - name: Build portable Electron package
        shell: powershell
        run: |
          npm run build:portable
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath release\LegacySaveStudio-Windows-x64.zip -Destination dist\LegacySaveStudio-Windows-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegacySaveStudio-Windows-x64
          path: dist/LegacySaveStudio-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LegacySaveStudio-Windows-x64.zip
          generate_release_notes: true
